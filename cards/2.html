<style>
    * {
        font-family: Arial, Helvetica, sans-serif;
    }
    :root {
        --color1: #3fc538;
    }
    .card {
        box-shadow: 1px 1px 5px black;
        border-radius: 50px;
        width: 350px;
        height: 450px;
    }

    .header {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: var(--color1);
        border-top-left-radius: 50px;
        border-top-right-radius: 50px;
        border-bottom: 1px solid black;
    }

    .avatar {
        position: relative;
        top: 25px;
        margin-top: 30px;
        border-radius: 50%;
        width: 128px;
    }
    .details {
        text-align: center;
        margin-top: 30px;
    }
    .name {
        font-size: 36px;
        font-weight: 500;
    }

    .links {
        margin-top: 20px;
        height: 60px;
        display: flex;
        justify-content: space-around;
        align-items: center;
    }

    .tik-tok, .instagram, .telegram, .twitter, .discrod {
        padding: 5px;
        box-shadow: 1px 1px 5px black;
        border-radius: 50%;
        transition: 0.2s;
    }

    .tik-tok:hover, .instagram:hover, .telegram:hover, .twitter:hover, .discrod:hover {
        background: rgb(200, 200, 200);
    }
</style>
