<style>
    * {
        font-family: "Courier New", Courier, monospace;
    }
    
    .terminal {
        background: rgb(34, 34, 34);
        width: 150px;
        height: 120px;
        border-radius: 10px;
        word-break: break-word;
        overflow-wrap: break-word;
    }

    .terminal-header {
        position: relative;
        background: rgb(200, 200, 200);
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
        height: 20px;
        width: 150px;
    }

    .terminal-header span {
        position: relative;
        margin: 6px;
        top: 2px;
        font-size: 14px;
    }

    .controls {
        position: relative;
        margin: 4px;
        top: 2px;
        float: right;
        width: 35px;
        height: 10px;
        display: flex;
        justify-content: space-between;
    }

    .control-button {
        width: 0.5em;
        height: 0.5em;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.2s;
    }

    .close {
        background: #fd5e56;
    }

    .minimize {
        background: #feba2d;
    }

    .maximize {
        background: #28c73d;
    }

    .close:hover {
        background: #b6443e;
    }

    .minimize:hover {
        background: #af7f1f;
    }

    .maximize:hover {
        background: #1a8729;
    }

    .close:active, .minimize:active, .maximize:active {
        scale: 0.9;
    }

    .terminal-text {
        margin: 2px;
        color: white;
        font-size: 12px;
    }
    .opacity {
        opacity: 0.6;
    }
</style>
<body>
    <div class="terminal" id="terminal">
        <div class="terminal-header">
            <span>Terminal</span>
            <div class="controls">
                <div id="close-button" class="close control-button"></div>
                <div class="minimize control-button"></div>
                <div class="maximize control-button"></div>
            </div>
        </div>
        <div class="terminal-main">
            <span class="terminal-text opacity" id="terminal-text">Enter any key to write</span>
        </div>
    </div>
</body>
<script>
    const terminalElement = document.querySelector("#terminal")
    const terminalTextElement = document.querySelector("#terminal-text");
    const closeButtonElement = document.querySelector("#close-button");

    document.addEventListener("keydown", (e) => {
        let comand = null;
        if (e.key === "Backspace") {
            terminalTextElement.textContent =
                terminalTextElement.textContent.slice(0, -1);
            comand = terminalTextElement.textContent;
        };

        if(!terminalTextElement || terminalTextElement.textContent.length < 128) { 
            if (/^[\p{L}0-9@._\-\(),'"` ]$/u.test(e.key)) {
                if(terminalTextElement.classList.contains("opacity")) {
                    terminalTextElement.textContent = "";
                    terminalTextElement.classList.remove("opacity")
                };

                terminalTextElement.textContent += e.key;
                comand = terminalTextElement.textContent;
            };
        }

    });
    closeButtonElement.addEventListener("click", () => {
        if(terminalElement) {
            terminalElement.remove()
        };
    });
</script>
