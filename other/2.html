<style>
    h1 {
        background: linear-gradient(
            120deg,
            red,
            orange,
            yellow,
            green,
            cyan,
            blue,
            violet
        );
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        
        background-size: 300% 300%;
        animation: gradientShift 8s ease infinite;
    }


    @keyframes gradientShift {
        0% {
            background-position: 0% 50%;
        }
        50% {
            background-position: 100% 50%;
        }
        100% {
            background-position: 0% 50%;
        }
    }
</style>   
<body>
    <h1>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Nesciunt laudantium aspernatur sit magnam temporibus quo numquam tenetur? Aliquid in possimus quae quis soluta odio numquam est temporibus accusantium? Suscipit, perferendis!</h1>
</body>
