<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
    * {
        font-family: Arial, Helvetica, sans-serif;
    }
    .input-container {
        font-size: 28px;
        padding: 10px 5px;
        width: 250px;
        background: #252525;
        border-radius: 0.5rem;
        display: flex;
        justify-content: space-around;
    }
    svg {
        cursor: pointer;
        color:#757575;
        transition: 0.2s;
    }

    input { color: white; }

    input, button {
        background: none;
        border: none;
        outline: none;
    }

    svg:hover {
        color: #ffff;
    }

    .add-file-icon:hover {
        animation: rotate 1s;
    }

    @keyframes rotate {
        to {
            transform: rotateZ(360deg);
        }
    }
</style>
<body>
    <div class="input-container">
        <input style="display: none;" type="file" id="file">
        <label for="file">
            <svg class="add-file-icon" fill="currentColor" width="26px" height="26px" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
            <path d="M352 480h320a32 32 0 1 1 0 64H352a32 32 0 0 1 0-64z"></path>
            <path d="M480 672V352a32 32 0 1 1 64 0v320a32 32 0 0 1-64 0z"></path>
            <path d="M512 896a384 384 0 1 0 0-768 384 384 0 0 0 0 768zm0 64a448 448 0 1 1 0-896 448 448 0 0 1 0 896z"></path>
            </svg>        
        </label>
        <input type="text" placeholder="Write a message">
        <button>
            <svg fill="currentColor" width="24px" height="24px" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path d="M31.083 16.589c0.105-0.167 0.167-0.371 0.167-0.589s-0.062-0.421-0.17-0.593l0.003 0.005c-0.030-0.051-0.059-0.094-0.091-0.135l0.002 0.003c-0.1-0.137-0.223-0.251-0.366-0.336l-0.006-0.003c-0.025-0.015-0.037-0.045-0.064-0.058l-28-14c-0.163-0.083-0.355-0.132-0.558-0.132-0.691 0-1.25 0.56-1.25 1.25 0 0.178 0.037 0.347 0.104 0.5l-0.003-0.008 5.789 13.508-5.789 13.508c-0.064 0.145-0.101 0.314-0.101 0.492 0 0.69 0.56 1.25 1.25 1.25 0 0 0 0 0.001 0h-0c0.001 0 0.002 0 0.003 0 0.203 0 0.394-0.049 0.563-0.136l-0.007 0.003 28-13.999c0.027-0.013 0.038-0.043 0.064-0.058 0.148-0.088 0.272-0.202 0.369-0.336l0.002-0.004c0.030-0.038 0.060-0.082 0.086-0.127l0.003-0.006zM4.493 4.645l20.212 10.105h-15.88zM8.825 17.25h15.88l-20.212 10.105z"></path>
            </svg>
        </button>
    </div>
