<style>
    .input-container {
        padding: 5px 10px;
        background: #cacaca;
        width: 250px;
        outline: 1px solid #b0b0b0;
        border-radius: 100px;

        display: flex;
        align-items: center;
        justify-content: space-around;
    }

    button, input {
        font-size: 24px;
        background: none;
        border: none;
        outline: none;
        transition: 1s;
    }
    input {
        width: 200px;
    }

    button:hover {
        transform: scale(1.2);
        cursor: pointer;
    }
</style>

    <div class="input-container">
        <button>
            <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M15.7955 15.8111L21 21M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>        </button>
        <input type="text" placeholder="Search...">
    </div>
</body>
