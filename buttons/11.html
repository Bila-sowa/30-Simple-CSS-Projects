<style>
    input {
        display: none;
    }
    div {
        width: 30px;
        height: 30px;
        border: 1px solid rgb(133, 133, 133);
        background: #f8f4e9;;
        border-radius: 3px;
        box-shadow: 1px 1px 5px rgb(133, 133, 133);
        transition: 0.2s;
    }
    input:checked ~ label div {
        background: rgb(118, 118, 118);
    }

</style>
<body>
    <input type="checkbox" id="checkbox">
    <label for="checkbox">
        <div></div>
    </label>
</body>
