<style>
    * {
        padding: 0;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
    }

    .setting-button {
        background: none;
        border: none;
        cursor: pointer;
        position: fixed;
        z-index: 2;
        top: 20px;
        left: 20px;
        transition: transform 1s ease;
    }

    .setting-button img {
        width: 40px;
        height: 40px;
    }

    .setting-button:hover {
        transform: rotate(-360deg);
    }

    .setting-menu {
        display: block;
        position: fixed;
        top: 0;
        left: -450px;
        width: 450px;
        height: 100%;
        outline: 1px solid black;
        background: white;
        transition: left 1s ease;
        z-index: 1;
    }

    .active {
        left: 0%;
    }

    .setting-menu ul {
        padding: 100px;
    }

    .setting-menu li {
        list-style: none;
        font-size: 24px;
        font-weight: 300;
        padding-top: 10px;
    }
</style>
<body>
    <button class="setting-button" id="setting-button">
        <img src="./svg/3.svg">
    </button>

    <div class="setting-menu" id="setting-menu">
        <ul class="setting-menu-list">
            <li>Profile</li>
            <li>Password and security</li>
            <li>Sign out</li>
        </ul>
    </div>
</body>
<script>
    const settingMenuButtonElement = document.querySelector("#setting-button");
    const settingMenuElement = document.querySelector("#setting-menu");
    
    settingMenuButtonElement.addEventListener("click", () => {
        settingMenuElement.classList.toggle("active");
    });
</script>
