<style>
    button {
        background: #79acff;
        padding: 10px 20px;
        border: none;
        border-radius: 200px;
        box-shadow: 3px 3px 1px #5a81c0;
        outline: 1px solid #5a81c0;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        cursor: pointer;
        transition: 0.2s;
    }
    button:hover {
        background: #5a81c0;
        transition: 0.2s;
    }
    button:active {
        background: #446291;
    }
</style>
<body>
    <button>Click me</button>
</body>
