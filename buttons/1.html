<style>
    button {
        color: transparent;
        font-family: 'Courier New', Courier, monospace;
        font-size: 2rem;
        font-weight: bold;
        background: linear-gradient(144deg, #af40ff, #5b42f3 50%, #00ddeb);
        text-transform: capitalize;
        border-radius: 10px;
        background-clip: text;
        -webkit-background-clip: text;
        outline: 1px solid #5b42f3;
        border: 0;
        cursor: pointer;
        padding: 10px 20px;
        transition: 0.2s;
    }
    button:hover {
        color: rgba(255, 255, 255, 0.8);
        background: linear-gradient(144deg, rgba(176, 66, 255, 0.8), rgba(92, 69, 242, 0.8) 50%, rgba(0, 219, 235, 0.8)); 
        transition: 0.2s;   
    }
    button:active {
        color: white;
        background: linear-gradient(144deg, #af40ff, #5b42f3 50%, #00ddeb);
        scale: 0.8;
    }

    
</style>
<body>
    <button>
        Click
    </button>
</body>
